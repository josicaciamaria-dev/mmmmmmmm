<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Game Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f1115] text-slate-200 font-sans min-h-screen">

    <div id="authOverlay" class="fixed inset-0 bg-black z-[100] flex items-center justify-center">
        <div class="text-center bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl">
            <h2 class="text-xl mb-4 text-blue-400 font-bold uppercase tracking-widest">Acesso Restrito</h2>
            <input type="password" id="admin-pass" placeholder="Senha do Admin" class="block w-full bg-gray-800 border border-gray-700 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-center">
            <button onclick="checkPass()" class="block w-full mt-4 bg-blue-600 p-3 rounded-lg font-bold hover:bg-blue-700 transition">Entrar</button>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <div class="max-w-4xl mx-auto p-6">
            <header class="flex justify-between items-center mb-6 py-6 border-b border-gray-800">
                <div>
                    <h1 class="text-2xl font-black text-white">GAME_MANAGER <span class="text-blue-500">V2.0</span></h1>
                    <p class="text-gray-500 text-sm">Upload Direto: Firebase Storage + DB</p>
                </div>
                <a href="index.html" target="_blank" class="text-xs bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-full transition">Ver Site Público ↗</a>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div class="bg-blue-600/10 border border-blue-500/20 p-5 rounded-2xl text-center">
                    <p class="text-[10px] text-blue-400 font-bold uppercase tracking-tighter mb-1">Total de Acessos</p>
                    <h3 id="total-visitas" class="text-4xl font-black text-white">0</h3>
                </div>
                <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl text-center">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter mb-1">Status do Banco</p>
                    <h3 class="text-xl font-black text-green-500">ONLINE</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <section class="md:col-span-1">
                    <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 sticky top-6">
                        <h2 class="text-lg font-bold mb-4 text-white">Novo Lançamento</h2>
                        <form id="gameForm" class="space-y-4">
                            <input type="text" name="nome" placeholder="Título do Jogo" required class="w-full bg-gray-800 border border-transparent p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            
                            <div class="space-y-1">
                                <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">Plataforma</label>
                                <select name="plataforma" class="w-full bg-gray-800 border border-transparent p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                                    <option value="Windows (.ZIP)">Windows (.ZIP)</option>
                                    <option value="Windows (.EXE)">Windows (.EXE)</option>
                                    <option value="Android (.APK)">Android (.APK)</option>
                                </select>
                            </div>

                            <div class="space-y-1">
                                <label class="text-[10px] text-blue-400 font-bold ml-1 uppercase">Selecionar Arquivo</label>
                                <input type="file" name="arquivo_jogo" id="arquivo_jogo" required class="w-full bg-gray-800 border border-dashed border-gray-700 p-3 rounded-xl text-xs cursor-pointer hover:border-blue-500 transition">
                            </div>

                            <textarea name="desc" rows="3" placeholder="Descrição do jogo..." class="w-full bg-gray-800 border border-transparent p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm"></textarea>
                            
                            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-all uppercase">
                                Subir para o Firebase
                            </button>
                        </form>
                    </div>
                </section>

                <section class="md:col-span-2">
                    <h2 class="text-lg font-bold mb-4 text-white">Jogos Registrados</h2>
                    <div id="lista-jogos" class="space-y-3"></div>
                </section>
            </div>
        </div>
    </div>

<script>
  // Se estás a testar no teu próprio PC// Altere em AMBOS os arquivos (.html)
const API_URL = "http://localhost:3000";
    function checkPass() {
        const pass = document.getElementById('admin-pass').value;
        if (pass === "123") { 
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            carregarJogos();
            carregarStats();
        } else {
            alert("Senha incorreta!");
        }
    }

    async function carregarStats() {
        try {
            const res = await fetch(`${API_URL}/api/stats`);
            const data = await res.json();
            document.getElementById('total-visitas').innerText = data.total || 0;
        } catch (err) { console.error("Erro stats:", err); }
    }

    async function carregarJogos() {
        const lista = document.getElementById('lista-jogos');
        lista.innerHTML = '<p class="text-gray-500 animate-pulse">Lendo Firebase...</p>';
        try {
            const res = await fetch(`${API_URL}/api/jogos`);
            const jogos = await res.json();
            lista.innerHTML = '';
            jogos.forEach(jogo => {
                const item = document.createElement('div');
                item.className = "bg-gray-900 p-4 rounded-2xl border border-gray-800 flex justify-between items-center";
                item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="text-blue-500 font-bold text-xs uppercase">${jogo.plataforma}</div>
                        <div class="overflow-hidden">
                            <h3 class="text-white font-bold">${jogo.nome}</h3>
                            <p class="text-[10px] text-gray-600 truncate w-48">${jogo.url_jogo}</p>
                        </div>
                    </div>
                    <button onclick="deletarJogo('${jogo.id}')" class="text-red-500 text-xs font-bold hover:underline">Deletar</button>
                `;
                lista.appendChild(item);
            });
        } catch (err) { lista.innerHTML = '<p class="text-red-500">Erro ao carregar lista.</p>'; }
    }

    // SUBMIT COM ARQUIVO - ENVIANDO FORM-DATA PARA O SERVER
    document.getElementById('gameForm').onsubmit = async (e) => {
        e.preventDefault();

        const btn = document.getElementById('btnSubmit');
        const formData = new FormData(e.target); // Captura o arquivo e os textos
        
        btn.innerText = "🚀 SUBINDO...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API_URL}/api/upload-completo`, {
                method: 'POST',
                body: formData // Não precisa de Headers para FormData
            });

            if (res.ok) {
                alert("✅ Sucesso! Jogo e arquivo salvos no Firebase.");
                e.target.reset();
                carregarJogos();
            } else {
                const errorText = await res.text();
                alert("❌ Erro no upload: " + errorText);
            }
        } catch (err) {
            alert("❌ Erro de conexão com o servidor.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Subir para o Firebase";
        }
    };

    async function deletarJogo(id) {
        if (!confirm("Remover este jogo do Firebase?")) return;
        try {
            await fetch(`${API_URL}/api/jogos/${id}`, { method: 'DELETE' });
            carregarJogos();
        } catch (err) { alert("Erro ao deletar."); }
    }
</script>
</body>
</html>
